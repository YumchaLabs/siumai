name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature_set:
          - name: default
            args: ""
          - name: openai-only
            args: "--no-default-features --features openai"
          - name: openai-external
            args: "--no-default-features --features openai,provider-openai-external"
          - name: compat-only
            args: "--no-default-features --features openai-compatible"
          - name: compat-external
            args: "--no-default-features --features openai-compatible,provider-openai-compatible-external"
          - name: compat-external-std
            args: "--no-default-features --features openai-compatible,provider-openai-compatible-external,std-openai-external"
          - name: openai-external-std
            args: "--no-default-features --features openai,provider-openai-external,std-openai-external"
          - name: minimaxi-only
            args: "--no-default-features --features minimaxi"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Fetch
        run: cargo fetch

      - name: Check siumai (${{ matrix.feature_set.name }})
        run: cargo check -p siumai ${{ matrix.feature_set.args }}

